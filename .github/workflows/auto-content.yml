name: Autonomous content addition

on:
  schedule:
    - cron: "0 8 * * 4" # every Thursday, 08:00 UTC
  workflow_dispatch: {} # trigger manually from the Actions tab any time

permissions:
  contents: write

jobs:
  add-resource:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Draft and validate one new resource
        id: draft
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tools/auto_content.py

      - name: Commit and push if something was added
        if: steps.draft.outputs.added == 'true'
        run: |
          git config user.name "awth-content-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git commit -m "[auto-content] ${{ steps.draft.outputs.summary }}"
          git push
