<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stories of healing — A World That Heals</title>
  <meta name="description" content="Illustrative stories of getting through anxiety, depression, addiction, grief, trauma and self-doubt — reminders that change is possible." />
  <meta name="theme-color" content="#121309" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/lib.css" />
</head>
<body>
  <main id="main">
    <div class="container page-intro">
      <p class="page-intro__eyebrow">Stories of healing</p>
      <h1>Proof that things can change</h1>
      <p>Short, honest stories of getting through hard times. These are illustrative composites drawn from common experiences — not real named individuals — written to remind you that change is possible.</p>
    </div>
    <div class="container section" style="padding-top:0">
      <div class="filter-bar" id="filter-bar" role="group" aria-label="Filter by theme"></div>
      <div class="card-grid" id="stories-grid"></div>
    </div>
  </main>
  <script type="module">
    import { initDirectory } from "./js/directory.js";
    const items = await (await fetch("data/stories-index.json")).json();
    initDirectory({ data: items, mount: "stories-grid", filterKey: "category", detailPattern: (i) => `story.html?id=${i.id}` });
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
